# =========================================================================
# CloudNest — Application Configuration
# =========================================================================
# This file tells Spring Boot how to connect to the database,
# where to store files, and how to configure the server.
# =========================================================================

# -------------------- Server Configuration --------------------
server.port=8080

# -------------------- Database Configuration --------------------
# IMPORTANT: Create the database first in PostgreSQL:
#   CREATE DATABASE cloudnest_db;
spring.datasource.url=jdbc:postgresql://localhost:5432/cloudnest_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------- JPA / Hibernate Configuration --------------------
# "update" = Hibernate auto-creates/updates tables based on entity classes
# (Use "validate" or "none" in production)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------- Thymeleaf Configuration --------------------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# -------------------- File Upload Configuration --------------------
# Maximum file size: 50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# -------------------- CloudNest Custom Properties --------------------
# Base directory where uploaded files are stored (simulated distributed nodes)
cloudnest.storage.base-path=${STORAGE_BASE_PATH:storage}
# Maximum storage allowed per user (1GB = 1073741824 bytes)
cloudnest.storage.quota-bytes=1073741824
# Number of simulated storage nodes
cloudnest.storage.node-count=3

# -------------------- Actuator --------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# -------------------- Logging --------------------
logging.level.com.cloudnest=DEBUG
logging.level.org.springframework.security=INFO
