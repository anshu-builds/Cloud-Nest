# =========================================================================
# CloudNest — Production Configuration (Render + Neon)
# =========================================================================
# This profile is activated when deploying to Render.
# It overrides application.properties with production-safe values.
# All sensitive values come from environment variables set in Render.
# =========================================================================

# -------------------- Server --------------------
# Render assigns a dynamic port via the PORT environment variable
server.port=${PORT:8080}

# -------------------- Database (Neon PostgreSQL) --------------------
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool tuning for free-tier (limited connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------- Thymeleaf --------------------
# Enable caching in production for performance
spring.thymeleaf.cache=true

# -------------------- File Upload --------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# -------------------- CloudNest Custom --------------------
cloudnest.storage.base-path=/app/storage
cloudnest.storage.quota-bytes=1073741824
cloudnest.storage.node-count=3

# -------------------- Actuator --------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# -------------------- Logging --------------------
logging.level.com.cloudnest=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
