# =========================================================================
# CloudNest — Test Application Configuration
# =========================================================================

# -------------------- Database Configuration (H2) --------------------
spring.datasource.url=jdbc:h2:mem:cloudnest_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -------------------- JPA Configuration --------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -------------------- Custom Storage Properties for Testing --------------------
# Base directory for testing (isolated from production storage)
cloudnest.storage.base-path=target/test-storage
# 1GB quota
cloudnest.storage.quota-bytes=1073741824
# Number of nodes
cloudnest.storage.node-count=3

# -------------------- Logging --------------------
logging.level.com.cloudnest=INFO
logging.level.org.springframework.security=WARN
